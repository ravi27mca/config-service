spring:
  datasource:
    url: jdbc:mysql://localhost:3306/employee_db_qa
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: INFO
    org.springframework: INFO

server:
  port: 8082
  servlet:
    context-path: /employee-api

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
